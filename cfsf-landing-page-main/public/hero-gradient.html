<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Liquid Gradient - Chance for Souls</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      transition: background-color 0.5s ease;
    }
    #webGLApp {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .heading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
      font-family: "Poppins", sans-serif;
      font-size: clamp(3.5rem, 8vw, 8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      transition: color 0.5s ease;
    }
    .color-controls {
      position: fixed;
      top: 2rem;
      right: 2rem;
      z-index: 10;
      display: flex;
      gap: 1rem;
      pointer-events: auto;
    }
    .color-btn {
      min-width: 48px;
      height: 48px;
      padding: 0.75rem 1.25rem;
      border-radius: 24px;
      font-family: "Poppins", sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .color-btn:hover {
      transform: translateY(-2px);
    }
    .color-adjuster-panel {
      position: fixed;
      top: 2rem;
      left: 2rem;
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 1.5rem;
      min-width: 320px;
      max-width: 400px;
      pointer-events: auto;
      transition: all 0.3s ease;
      display: none;
    }
    .color-adjuster-panel.open {
      display: block;
    }
    .color-adjuster-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(128, 128, 128, 0.2);
    }
    .color-adjuster-title {
      font-family: "Poppins", sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .color-adjuster-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }
    .color-picker-group {
      margin-bottom: 1.25rem;
    }
    .color-picker-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .color-picker-wrapper {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .color-picker-input {
      width: 60px;
      height: 40px;
      border: 2px solid rgba(128, 128, 128, 0.3);
      border-radius: 8px;
      cursor: pointer;
      background: none;
      padding: 0;
      -webkit-appearance: none;
      appearance: none;
    }
    .color-picker-input::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    .color-picker-input::-webkit-color-swatch {
      border: none;
      border-radius: 6px;
    }
    .color-value-display {
      flex: 1;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-family: "Inter", monospace;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: text;
      user-select: all;
      transition: all 0.3s ease;
    }
    .color-value-display:focus {
      outline: none;
    }
    .copy-btn {
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-family: "Inter", sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      border: 1px solid transparent;
      background: transparent;
    }
    .color-adjuster-actions {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(128, 128, 128, 0.2);
      display: flex;
      gap: 0.75rem;
    }
    .export-btn {
      flex: 1;
      border-radius: 8px;
      padding: 0.75rem;
      font-family: "Poppins", sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      border: 1px solid transparent;
    }
    .export-btn:hover {
      transform: translateY(-2px);
    }
    .toggle-adjuster-btn {
      position: fixed;
      top: 2rem;
      left: 2rem;
      z-index: 100;
      padding: 0.75rem 1.5rem;
      font-family: "Poppins", sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      border-radius: 8px;
      pointer-events: auto;
      border: 1px solid transparent;
    }
    .toggle-adjuster-btn:hover {
      transform: translateY(-2px);
    }
    .footer {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: "Poppins", sans-serif;
      font-size: clamp(0.875rem, 1.5vw, 1.125rem);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-align: center;
      pointer-events: auto;
    }
    .footer a {
      text-decoration: none;
      transition: opacity 0.3s ease;
    }
    .footer a:hover {
      opacity: 0.7;
    }
    .custom-cursor {
      position: fixed;
      width: 40px;
      height: 40px;
      border: 2px solid #008b00; /* Brand Green */
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -50%);
      transition: width 0.2s ease, height 0.2s ease, border-width 0.2s ease;
      background: transparent;
      will-change: transform;
    }
    .custom-cursor::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      background: #008b00; /* Brand Green */
      border-radius: 50%;
    }
    body {
      cursor: none;
    }

    /* Light Theme Styling */
    body.light-theme .heading { color: #004e00; }
    body.light-theme .color-btn, body.light-theme .toggle-adjuster-btn {
      color: #111827; 
      border-color: rgba(0,0,0,0.15); 
      background: rgba(255,255,255,0.6);
    }
    body.light-theme .color-btn:hover, body.light-theme .toggle-adjuster-btn:hover {
      background: rgba(255,255,255,0.9);
      border-color: rgba(0,0,0,0.3);
    }
    body.light-theme .color-btn.active {
      background: rgba(34, 197, 94, 0.2);
      border-color: rgba(0, 139, 0, 0.4);
    }
    body.light-theme .color-adjuster-panel {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
    }
    body.light-theme .color-adjuster-title,
    body.light-theme .color-adjuster-close,
    body.light-theme .color-picker-label,
    body.light-theme .footer a { color: #111827; }
    body.light-theme .color-value-display {
      background: rgba(255, 255, 255, 0.6);
      color: #111827; 
      border: 1px solid rgba(0,0,0,0.15);
    }
    body.light-theme .copy-btn, body.light-theme .export-btn {
      color: #111827;
      background: rgba(255, 255, 255, 0.5);
      border-color: rgba(0,0,0,0.15);
    }
    body.light-theme .copy-btn:hover, body.light-theme .export-btn:hover {
      background: rgba(255, 255, 255, 0.8);
    }

    /* Dark Theme Styling */
    body.dark-theme .heading { color: #f0fff4; }
    body.dark-theme .color-btn, body.dark-theme .toggle-adjuster-btn {
      color: #ffffff; 
      border-color: rgba(255,255,255,0.3); 
      background: rgba(255,255,255,0.1);
    }
    body.dark-theme .color-btn:hover, body.dark-theme .toggle-adjuster-btn:hover {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.5);
    }
    body.dark-theme .color-btn.active {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.6);
    }
    body.dark-theme .color-adjuster-panel {
      background: rgba(0, 59, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    body.dark-theme .color-adjuster-title,
    body.dark-theme .color-adjuster-close,
    body.dark-theme .color-picker-label,
    body.dark-theme .footer a { color: #ffffff; }
    body.dark-theme .color-value-display {
      background: rgba(0, 0, 0, 0.4);
      color: #ffffff; 
      border: 1px solid rgba(255,255,255,0.2);
    }
    body.dark-theme .copy-btn, body.dark-theme .export-btn {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }
    body.dark-theme .copy-btn:hover, body.dark-theme .export-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>

  <script>
    class TouchTexture {
      constructor() {
        this.size = 64;
        this.width = this.height = this.size;
        this.maxAge = 64;
        this.radius = 0.25 * this.size;
        this.speed = 1 / this.maxAge;
        this.trail = [];
        this.last = null;
        this.initTexture();
      }

      initTexture() {
        this.canvas = document.createElement("canvas");
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        this.ctx = this.canvas.getContext("2d");
        this.ctx.fillStyle = "black";
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        this.texture = new THREE.Texture(this.canvas);
      }

      update() {
        this.clear();
        let speed = this.speed;
        for (let i = this.trail.length - 1; i >= 0; i--) {
          const point = this.trail[i];
          let f = point.force * speed * (1 - point.age / this.maxAge);
          point.x += point.vx * f;
          point.y += point.vy * f;
          point.age++;
          if (point.age > this.maxAge) {
            this.trail.splice(i, 1);
          } else {
            this.drawPoint(point);
          }
        }
        this.texture.needsUpdate = true;
      }

      clear() {
        this.ctx.fillStyle = "black";
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
      }

      addTouch(point) {
        let force = 0;
        let vx = 0;
        let vy = 0;
        const last = this.last;
        if (last) {
          const dx = point.x - last.x;
          const dy = point.y - last.y;
          if (dx === 0 && dy === 0) return;
          const dd = dx * dx + dy * dy;
          let d = Math.sqrt(dd);
          vx = dx / d;
          vy = dy / d;
          force = Math.min(dd * 20000, 2.0);
        }
        this.last = { x: point.x, y: point.y };
        this.trail.push({ x: point.x, y: point.y, age: 0, force, vx, vy });
      }

      drawPoint(point) {
        const pos = {
          x: point.x * this.width,
          y: (1 - point.y) * this.height
        };

        let intensity = 1;
        if (point.age < this.maxAge * 0.3) {
          intensity = Math.sin((point.age / (this.maxAge * 0.3)) * (Math.PI / 2));
        } else {
          const t = 1 - (point.age - this.maxAge * 0.3) / (this.maxAge * 0.7);
          intensity = -t * (t - 2);
        }
        intensity *= point.force;

        const radius = this.radius;
        let color = `${((point.vx + 1) / 2) * 255}, ${((point.vy + 1) / 2) * 255}, ${intensity * 255}`;
        let offset = this.size * 5;
        this.ctx.shadowOffsetX = offset;
        this.ctx.shadowOffsetY = offset;
        this.ctx.shadowBlur = radius * 1;
        this.ctx.shadowColor = `rgba(${color},${0.2 * intensity})`;

        this.ctx.beginPath();
        this.ctx.fillStyle = "rgba(255,0,0,1)";
        this.ctx.arc(pos.x - offset, pos.y - offset, radius, 0, Math.PI * 2);
        this.ctx.fill();
      }
    }

    class GradientBackground {
      constructor(sceneManager) {
        this.sceneManager = sceneManager;
        this.mesh = null;
        this.uniforms = {
          uTime: { value: 0 },
          uResolution: {
            value: new THREE.Vector2(window.innerWidth, window.innerHeight)
          },
          // Colors will be set dynamically via schemes below; these are defaults
          uColor1: { value: new THREE.Vector3(0.0, 0.545, 0.0) }, // #008b00
          uColor2: { value: new THREE.Vector3(0.863, 0.988, 0.906) }, // #dcfce7
          uColor3: { value: new THREE.Vector3(0.133, 0.773, 0.369) }, // #22c55e
          uColor4: { value: new THREE.Vector3(0.0, 0.545, 0.0) },
          uColor5: { value: new THREE.Vector3(0.863, 0.988, 0.906) },
          uColor6: { value: new THREE.Vector3(0.133, 0.773, 0.369) },
          uSpeed: { value: 1.2 },
          uIntensity: { value: 1.8 },
          uTouchTexture: { value: null },
          uGrainIntensity: { value: 0.08 },
          uZoom: { value: 1.0 },
          uBaseColor: { value: new THREE.Vector3(0.941, 1.0, 0.957) }, // #f0fff4 base
          uGradientSize: { value: 1.0 },
          uGradientCount: { value: 8.0 },
          uColor1Weight: { value: 1.0 },
          uColor2Weight: { value: 1.0 }
        };
      }

      init() {
        const viewSize = this.sceneManager.getViewSize();
        const geometry = new THREE.PlaneGeometry(viewSize.width, viewSize.height, 1, 1);

        const material = new THREE.ShaderMaterial({
          uniforms: this.uniforms,
          vertexShader: `
                varying vec2 vUv;
                void main() {
                  vec3 pos = position.xyz;
                  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.);
                  vUv = uv;
                }
              `,
          fragmentShader: `
                uniform float uTime;
                uniform vec2 uResolution;
                uniform vec3 uColor1; uniform vec3 uColor2; uniform vec3 uColor3;
                uniform vec3 uColor4; uniform vec3 uColor5; uniform vec3 uColor6;
                uniform float uSpeed; uniform float uIntensity;
                uniform sampler2D uTouchTexture;
                uniform float uGrainIntensity; uniform float uZoom;
                uniform vec3 uBaseColor; // Adjusted uniform base name
                uniform float uGradientSize; uniform float uGradientCount;
                uniform float uColor1Weight; uniform float uColor2Weight;
                
                varying vec2 vUv;
                
                #define PI 3.14159265359
                
                float grain(vec2 uv, float time) {
                  vec2 grainUv = uv * uResolution * 0.5;
                  float grainValue = fract(sin(dot(grainUv + time, vec2(12.9898, 78.233))) * 43758.5453);
                  return grainValue * 2.0 - 1.0;
                }
                
                vec3 getGradientColor(vec2 uv, float time) {
                  float gradientRadius = uGradientSize;
                  
                  vec2 center1 = vec2(0.5 + sin(time * uSpeed * 0.4) * 0.4, 0.5 + cos(time * uSpeed * 0.5) * 0.4);
                  vec2 center2 = vec2(0.5 + cos(time * uSpeed * 0.6) * 0.5, 0.5 + sin(time * uSpeed * 0.45) * 0.5);
                  vec2 center3 = vec2(0.5 + sin(time * uSpeed * 0.35) * 0.45, 0.5 + cos(time * uSpeed * 0.55) * 0.45);
                  vec2 center4 = vec2(0.5 + cos(time * uSpeed * 0.5) * 0.4, 0.5 + sin(time * uSpeed * 0.4) * 0.4);
                  vec2 center5 = vec2(0.5 + sin(time * uSpeed * 0.7) * 0.35, 0.5 + cos(time * uSpeed * 0.6) * 0.35);
                  vec2 center6 = vec2(0.5 + cos(time * uSpeed * 0.45) * 0.5, 0.5 + sin(time * uSpeed * 0.65) * 0.5);
                  vec2 center7 = vec2(0.5 + sin(time * uSpeed * 0.55) * 0.38, 0.5 + cos(time * uSpeed * 0.48) * 0.42);
                  vec2 center8 = vec2(0.5 + cos(time * uSpeed * 0.65) * 0.36, 0.5 + sin(time * uSpeed * 0.52) * 0.44);
                  vec2 center9 = vec2(0.5 + sin(time * uSpeed * 0.42) * 0.41, 0.5 + cos(time * uSpeed * 0.58) * 0.39);
                  vec2 center10= vec2(0.5 + cos(time * uSpeed * 0.48) * 0.37, 0.5 + sin(time * uSpeed * 0.62) * 0.43);
                  vec2 center11= vec2(0.5 + sin(time * uSpeed * 0.68) * 0.33, 0.5 + cos(time * uSpeed * 0.44) * 0.46);
                  vec2 center12= vec2(0.5 + cos(time * uSpeed * 0.38) * 0.39, 0.5 + sin(time * uSpeed * 0.56) * 0.41);
                  
                  float dist1 = length(uv - center1); float dist2 = length(uv - center2);
                  float dist3 = length(uv - center3); float dist4 = length(uv - center4);
                  float dist5 = length(uv - center5); float dist6 = length(uv - center6);
                  float dist7 = length(uv - center7); float dist8 = length(uv - center8);
                  float dist9 = length(uv - center9); float dist10 = length(uv - center10);
                  float dist11 = length(uv - center11); float dist12 = length(uv - center12);
                  
                  float influence1 = 1.0 - smoothstep(0.0, gradientRadius, dist1);
                  float influence2 = 1.0 - smoothstep(0.0, gradientRadius, dist2);
                  float influence3 = 1.0 - smoothstep(0.0, gradientRadius, dist3);
                  float influence4 = 1.0 - smoothstep(0.0, gradientRadius, dist4);
                  float influence5 = 1.0 - smoothstep(0.0, gradientRadius, dist5);
                  float influence6 = 1.0 - smoothstep(0.0, gradientRadius, dist6);
                  float influence7 = 1.0 - smoothstep(0.0, gradientRadius, dist7);
                  float influence8 = 1.0 - smoothstep(0.0, gradientRadius, dist8);
                  float influence9 = 1.0 - smoothstep(0.0, gradientRadius, dist9);
                  float influence10 = 1.0 - smoothstep(0.0, gradientRadius, dist10);
                  float influence11 = 1.0 - smoothstep(0.0, gradientRadius, dist11);
                  float influence12 = 1.0 - smoothstep(0.0, gradientRadius, dist12);
                  
                  vec2 rotatedUv1 = uv - 0.5;
                  float angle1 = time * uSpeed * 0.15;
                  rotatedUv1 = vec2(rotatedUv1.x * cos(angle1) - rotatedUv1.y * sin(angle1), rotatedUv1.x * sin(angle1) + rotatedUv1.y * cos(angle1));
                  rotatedUv1 += 0.5;
                  
                  vec2 rotatedUv2 = uv - 0.5;
                  float angle2 = -time * uSpeed * 0.12;
                  rotatedUv2 = vec2(rotatedUv2.x * cos(angle2) - rotatedUv2.y * sin(angle2), rotatedUv2.x * sin(angle2) + rotatedUv2.y * cos(angle2));
                  rotatedUv2 += 0.5;
                  
                  float radialGradient1 = length(rotatedUv1 - 0.5);
                  float radialGradient2 = length(rotatedUv2 - 0.5);
                  float radialInfluence1 = 1.0 - smoothstep(0.0, 0.8, radialGradient1);
                  float radialInfluence2 = 1.0 - smoothstep(0.0, 0.8, radialGradient2);
                  
                  vec3 color = vec3(0.0);
                  color += uColor1 * influence1 * (0.55 + 0.45 * sin(time * uSpeed)) * uColor1Weight;
                  color += uColor2 * influence2 * (0.55 + 0.45 * cos(time * uSpeed * 1.2)) * uColor2Weight;
                  color += uColor3 * influence3 * (0.55 + 0.45 * sin(time * uSpeed * 0.8)) * uColor1Weight;
                  color += uColor4 * influence4 * (0.55 + 0.45 * cos(time * uSpeed * 1.3)) * uColor2Weight;
                  color += uColor5 * influence5 * (0.55 + 0.45 * sin(time * uSpeed * 1.1)) * uColor1Weight;
                  color += uColor6 * influence6 * (0.55 + 0.45 * cos(time * uSpeed * 0.9)) * uColor2Weight;
                  
                  if (uGradientCount > 6.0) {
                    color += uColor1 * influence7 * (0.55 + 0.45 * sin(time * uSpeed * 1.4)) * uColor1Weight;
                    color += uColor2 * influence8 * (0.55 + 0.45 * cos(time * uSpeed * 1.5)) * uColor2Weight;
                    color += uColor3 * influence9 * (0.55 + 0.45 * sin(time * uSpeed * 1.6)) * uColor1Weight;
                    color += uColor4 * influence10 * (0.55 + 0.45 * cos(time * uSpeed * 1.7)) * uColor2Weight;
                  }
                  if (uGradientCount > 10.0) {
                    color += uColor5 * influence11 * (0.55 + 0.45 * sin(time * uSpeed * 1.8)) * uColor1Weight;
                    color += uColor6 * influence12 * (0.55 + 0.45 * cos(time * uSpeed * 1.9)) * uColor2Weight;
                  }
                  
                  color += mix(uColor1, uColor3, radialInfluence1) * 0.45 * uColor1Weight;
                  color += mix(uColor2, uColor4, radialInfluence2) * 0.4 * uColor2Weight;
                  
                  color = clamp(color, vec3(0.0), vec3(1.0)) * uIntensity;
                  
                  float luminance = dot(color, vec3(0.299, 0.587, 0.114));
                  color = mix(vec3(luminance), color, 1.35);
                  color = pow(color, vec3(0.92)); 
                  
                  float brightness1 = length(color);
                  float mixFactor1 = max(brightness1 * 1.2, 0.15); 
                  color = mix(uBaseColor, color, mixFactor1);
                  
                  float maxBrightness = 1.0;
                  float brightness = length(color);
                  if (brightness > maxBrightness) {
                    color = color * (maxBrightness / brightness);
                  }
                  
                  return color;
                }
                
                void main() {
                  vec2 uv = vUv;
                  
                  vec4 touchTex = texture2D(uTouchTexture, uv);
                  float vx = -(touchTex.r * 2.0 - 1.0);
                  float vy = -(touchTex.g * 2.0 - 1.0);
                  float intensity = touchTex.b;
                  uv.x += vx * 0.8 * intensity;
                  uv.y += vy * 0.8 * intensity;
                  
                  vec2 center = vec2(0.5);
                  float dist = length(uv - center);
                  float ripple = sin(dist * 20.0 - uTime * 3.0) * 0.04 * intensity;
                  float wave = sin(dist * 15.0 - uTime * 2.0) * 0.03 * intensity;
                  uv += vec2(ripple + wave);
                  
                  vec3 color = getGradientColor(uv, uTime);
                  
                  float grainValue = grain(uv, uTime);
                  color += grainValue * uGrainIntensity;
                  
                  float timeShift = uTime * 0.5;
                  color.r += sin(timeShift) * 0.02;
                  color.g += cos(timeShift * 1.4) * 0.02;
                  color.b += sin(timeShift * 1.2) * 0.02;
                  
                  float brightness2 = length(color);
                  float mixFactor2 = max(brightness2 * 1.2, 0.15);
                  color = mix(uBaseColor, color, mixFactor2);
                  
                  color = clamp(color, vec3(0.0), vec3(1.0));
                  
                  float maxBrightness = 1.0;
                  float brightness = length(color);
                  if (brightness > maxBrightness) {
                    color = color * (maxBrightness / brightness);
                  }
                  
                  gl_FragColor = vec4(color, 1.0);
                }
              `
        });

        this.mesh = new THREE.Mesh(geometry, material);
        this.mesh.position.z = 0;
        this.sceneManager.scene.add(this.mesh);
      }

      update(delta) {
        if (this.uniforms.uTime) {
          this.uniforms.uTime.value += delta;
        }
      }

      onResize(width, height) {
        const viewSize = this.sceneManager.getViewSize();
        if (this.mesh) {
          this.mesh.geometry.dispose();
          this.mesh.geometry = new THREE.PlaneGeometry(viewSize.width, viewSize.height, 1, 1);
        }
        if (this.uniforms.uResolution) {
          this.uniforms.uResolution.value.set(width, height);
        }
      }
    }

    class App {
      constructor() {
        this.renderer = new THREE.WebGLRenderer({
          antialias: true,
          powerPreference: "high-performance",
          alpha: false,
          stencil: false,
          depth: false
        });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.setAnimationLoop(null);
        document.body.appendChild(this.renderer.domElement);
        this.renderer.domElement.id = "webGLApp";

        this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
        this.camera.position.z = 50;
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0xf0fff4); // Light green base
        this.clock = new THREE.Clock();

        this.touchTexture = new TouchTexture();
        this.gradientBackground = new GradientBackground(this);
        this.gradientBackground.uniforms.uTouchTexture.value = this.touchTexture.texture;

        // Custom Green Color Schemes based on Tailwind config
        this.colorSchemes = {
          1: { // Fresh Light Green (Default)
            color1: new THREE.Vector3(0.0, 0.545, 0.0),   // #008b00 (Brand Green)
            color2: new THREE.Vector3(0.863, 0.988, 0.906), // #dcfce7 (primary-100)
            color3: new THREE.Vector3(0.133, 0.773, 0.369), // #22c55e (primary-500)
            baseColor: new THREE.Vector3(0.941, 1.0, 0.957), // #f0fff4 base
            sceneBg: 0xf0fff4,
            theme: 'light'
          },
          2: { // Vibrant Brand & Secondary Greens
            color1: new THREE.Vector3(0.0, 0.545, 0.0),   // #008b00
            color2: new THREE.Vector3(0.333, 0.863, 0.525), // #55dc86 (secondary-500)
            color3: new THREE.Vector3(0.133, 0.773, 0.369), // #22c55e
            baseColor: new THREE.Vector3(0.816, 0.969, 0.863), // #d1f7dc base
            sceneBg: 0xd1f7dc,
            theme: 'light'
          },
          3: { // Midnight / Dark Green
            color1: new THREE.Vector3(0.0, 0.231, 0.0),   // #003b00 (primary-900)
            color2: new THREE.Vector3(0.071, 0.373, 0.188), // #125f30 (secondary-900)
            color3: new THREE.Vector3(0.0, 0.545, 0.0),   // #008b00
            baseColor: new THREE.Vector3(0.0, 0.15, 0.0),   // Very dark green base
            sceneBg: 0x002200,
            theme: 'dark'
          },
          4: { // High Contrast Dark
            color1: new THREE.Vector3(0.29, 0.871, 0.502), // #4ade80 (primary-400)
            color2: new THREE.Vector3(0.102, 0.639, 0.314), // #1aa350 (secondary-700)
            color3: new THREE.Vector3(0.0, 0.306, 0.0),   // #004e00 (primary-800)
            baseColor: new THREE.Vector3(0.04, 0.05, 0.04), // Near black base
            sceneBg: 0x0a0c0a,
            theme: 'dark'
          }
        };
        this.currentScheme = 1;

        this.init();
      }

      setColorScheme(scheme) {
        if (!this.colorSchemes[scheme]) return;
        this.currentScheme = scheme;
        const colors = this.colorSchemes[scheme];
        const uniforms = this.gradientBackground.uniforms;

        document.body.className = colors.theme === 'dark' ? 'dark-theme' : 'light-theme';

        uniforms.uColor1.value.copy(colors.color1);
        uniforms.uColor2.value.copy(colors.color2);
        uniforms.uColor3.value.copy(colors.color3);
        uniforms.uColor4.value.copy(colors.color1);
        uniforms.uColor5.value.copy(colors.color2);
        uniforms.uColor6.value.copy(colors.color3);
        
        uniforms.uBaseColor.value.copy(colors.baseColor);
        this.scene.background = new THREE.Color(colors.sceneBg);
        
        // Settings adjusting based on scheme (can be tweaked)
        if (scheme === 1 || scheme === 2) {
            uniforms.uGradientSize.value = 1.2;
            uniforms.uGradientCount.value = 6.0;
            uniforms.uSpeed.value = 1.0;
            uniforms.uColor1Weight.value = 1.2;
            uniforms.uColor2Weight.value = 1.0;
        } else {
            uniforms.uGradientSize.value = 0.8;
            uniforms.uGradientCount.value = 10.0;
            uniforms.uSpeed.value = 1.3;
            uniforms.uColor1Weight.value = 0.8;
            uniforms.uColor2Weight.value = 1.5;
        }
      }

      init() {
        this.gradientBackground.init();
        this.setColorScheme(1);
        this.render();
        this.tick();

        window.addEventListener("resize", () => this.onResize());
        window.addEventListener("mousemove", (ev) => this.onMouseMove(ev));
        window.addEventListener("touchmove", (ev) => this.onTouchMove(ev));
        document.addEventListener("visibilitychange", () => {
          if (!document.hidden) this.render();
        });

        const wakeUpAnimation = () => {
          this.render();
          window.removeEventListener("click", wakeUpAnimation);
          window.removeEventListener("touchstart", wakeUpAnimation);
          window.removeEventListener("mousemove", wakeUpAnimation);
        };
        window.addEventListener("click", wakeUpAnimation, { once: true });
        window.addEventListener("touchstart", wakeUpAnimation, { once: true });
        window.addEventListener("mousemove", wakeUpAnimation, { once: true });
      }

      onTouchMove(ev) {
        const touch = ev.touches[0];
        this.onMouseMove({ clientX: touch.clientX, clientY: touch.clientY });
      }

      onMouseMove(ev) {
        this.mouse = {
          x: ev.clientX / window.innerWidth,
          y: 1 - ev.clientY / window.innerHeight
        };
        this.touchTexture.addTouch(this.mouse);
      }

      getViewSize() {
        const fovInRadians = (this.camera.fov * Math.PI) / 180;
        const height = Math.abs(this.camera.position.z * Math.tan(fovInRadians / 2) * 2);
        return { width: height * this.camera.aspect, height };
      }

      update(delta) {
        this.touchTexture.update();
        this.gradientBackground.update(delta);
      }

      render() {
        const delta = this.clock.getDelta();
        const clampedDelta = Math.min(delta, 0.1);
        this.renderer.render(this.scene, this.camera);
        this.update(clampedDelta);
      }

      tick() {
        this.render();
        requestAnimationFrame(() => this.tick());
      }

      onResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.gradientBackground.onResize(window.innerWidth, window.innerHeight);
      }
    }

    const app = new App();

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", () => app.render());
    } else {
      setTimeout(() => app.render(), 0);
    }

    // Color scheme buttons
    const colorButtons = document.querySelectorAll(".color-btn");
    colorButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        const scheme = parseInt(btn.dataset.scheme);
        app.setColorScheme(scheme);
        colorButtons.forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        updateColorPickersFromScheme();
      });
    });

    const colorAdjusterPanel = document.getElementById("colorAdjusterPanel");
    const toggleAdjusterBtn = document.getElementById("toggleAdjusterBtn");
    const closeAdjusterBtn = document.getElementById("closeAdjusterBtn");

    toggleAdjusterBtn.addEventListener("click", () => {
      colorAdjusterPanel.classList.toggle("open");
      if (colorAdjusterPanel.classList.contains("open")) {
        updateColorPickersFromScheme();
        toggleAdjusterBtn.style.display = "none";
      } else {
        toggleAdjusterBtn.style.display = "block";
      }
    });

    closeAdjusterBtn.addEventListener("click", () => {
      colorAdjusterPanel.classList.remove("open");
      toggleAdjusterBtn.style.display = "block";
    });

    function rgbToHex(r, g, b) {
      const toHex = (n) => {
        const hex = Math.round(n * 255).toString(16);
        return hex.length === 1 ? "0" + hex : hex;
      };
      return "#" + toHex(r) + toHex(g) + toHex(b);
    }

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16) / 255,
        g: parseInt(result[2], 16) / 255,
        b: parseInt(result[3], 16) / 255
      } : null;
    }

    function updateColorPickersFromScheme() {
      const uniforms = app.gradientBackground.uniforms;
      const colors = [
        uniforms.uColor1.value, uniforms.uColor2.value, uniforms.uColor3.value,
        uniforms.uColor4.value, uniforms.uColor5.value, uniforms.uColor6.value
      ];
      colors.forEach((color, index) => {
        const picker = document.getElementById(`colorPicker${index + 1}`);
        const display = document.getElementById(`colorValue${index + 1}`);
        const hex = rgbToHex(color.x, color.y, color.z);
        picker.value = hex;
        display.value = hex.toUpperCase();
      });
    }

    for (let i = 1; i <= 6; i++) {
      const picker = document.getElementById(`colorPicker${i}`);
      const display = document.getElementById(`colorValue${i}`);
      picker.addEventListener("input", (e) => {
        const hex = e.target.value;
        const rgb = hexToRgb(hex);
        if (rgb) {
          const uniforms = app.gradientBackground.uniforms;
          const colorUniform = uniforms[`uColor${i}`];
          if (colorUniform) {
            colorUniform.value.set(rgb.r, rgb.g, rgb.b);
            display.value = hex.toUpperCase();
          }
        }
      });
    }

    document.querySelectorAll(".copy-btn").forEach((btn) => {
      btn.addEventListener("click", (e) => {
        const colorIndex = e.target.dataset.copy;
        const display = document.getElementById(`colorValue${colorIndex}`);
        navigator.clipboard.writeText(display.value).then(() => {
          e.target.textContent = "Copied!";
          setTimeout(() => e.target.textContent = "Copy", 2000);
        });
      });
    });

    const exportAllBtn = document.getElementById("exportAllBtn");
    exportAllBtn.addEventListener("click", () => {
      const colors = [];
      for (let i = 1; i <= 6; i++) {
        colors.push(document.getElementById(`colorValue${i}`).value);
      }
      const exportText = `Color Scheme:\n${colors.map((c, i) => `Color ${i + 1}: ${c}`).join("\n")}\n\nHex Array: [${colors.map((c) => `"${c}"`).join(", ")}]`;
      navigator.clipboard.writeText(exportText).then(() => {
        exportAllBtn.textContent = "Copied!";
        setTimeout(() => exportAllBtn.textContent = "Export All Colors", 2000);
      });
    });

    // Custom cursor logic
    const cursor = document.getElementById("customCursor");
    let mouseX = 0; let mouseY = 0;
    
    document.addEventListener("mousemove", (e) => {
      mouseX = e.clientX; mouseY = e.clientY;
      if (!isCursorAnimating) {
        isCursorAnimating = true;
        animateCursor();
      }
    });

    let isCursorAnimating = false;
    function animateCursor() {
      if (!isCursorAnimating) return;
      cursor.style.left = mouseX + "px";
      cursor.style.top = mouseY + "px";
      requestAnimationFrame(animateCursor);
    }

    const hoverElements = document.querySelectorAll(".footer a, .color-btn, .toggle-adjuster-btn");
    hoverElements.forEach(el => {
      el.addEventListener("mouseenter", () => {
        cursor.style.width = "50px"; cursor.style.height = "50px"; cursor.style.borderWidth = "3px";
      });
      el.addEventListener("mouseleave", () => {
        cursor.style.width = "40px"; cursor.style.height = "40px"; cursor.style.borderWidth = "2px";
      });
    });
  </script>
</body>
</html>
